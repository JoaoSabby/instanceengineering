name: Oracle Linux 9.7 R 4.5.3 validation

on:
  workflow_dispatch:
  push:
    paths:
      - "docker/oraclelinux97-r453/Dockerfile"
      - "docker/oraclelinux97-r453/r-config/**"
      - ".github/workflows/main.yml"
      - "R/**"
      - "src/**"
      - "DESCRIPTION"
      - "NAMESPACE"
      - "tools/docker/**"

jobs:
  docker-tests:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show commit and configuration files
        run: |
          echo "Commit:"
          git rev-parse HEAD

          echo "Dockerfile:"
          sed -n '1,240p' docker/oraclelinux97-r453/Dockerfile

          echo "Renviron:"
          sed -n '1,240p' docker/oraclelinux97-r453/r-config/.Renviron

          echo "Rprofile:"
          sed -n '1,240p' docker/oraclelinux97-r453/r-config/.Rprofile

          echo "Makevars:"
          sed -n '1,240p' docker/oraclelinux97-r453/r-config/Makevars

          echo "Searching unsupported packages:"
          grep -R -n "qpdf" docker/oraclelinux97-r453 || true

          echo "Searching sensitive terms:"
          grep -R -n -i "password\|secret\|credential\|user\|host\|database\|dbname\|oracle\|client\|cliente\|banco" \
            docker/oraclelinux97-r453/r-config \
            .github/workflows/main.yml || true

      - name: Build Oracle Linux image
        run: |
          docker build \
            --no-cache \
            -f docker/oraclelinux97-r453/Dockerfile \
            -t instenginer:oraclelinux97-r453 \
            .

      - name: Create output directory
        run: |
          mkdir -p test-results

      - name: Run first container
        run: |
          docker run --rm \
            -e INSTANCE_ID=gha_1 \
            -e TEST_REPETITIONS=2 \
            -e TEST_KNN_WORKERS=2 \
            -e TEST_OUTPUT_DIR=/workspace/r-package-validation/results \
            -v "$PWD/test-results:/workspace/r-package-validation/results" \
            instenginer:oraclelinux97-r453 \
            Rscript tools/docker/run_many_tests.R

      - name: Run second container
        run: |
          docker run --rm \
            -e INSTANCE_ID=gha_2 \
            -e TEST_REPETITIONS=2 \
            -e TEST_KNN_WORKERS=2 \
            -e TEST_OUTPUT_DIR=/workspace/r-package-validation/results \
            -v "$PWD/test-results:/workspace/r-package-validation/results" \
            instenginer:oraclelinux97-r453 \
            Rscript tools/docker/run_many_tests.R

      - name: Show generated files
        if: always()
        run: |
          echo "Files in test-results:"
          ls -lah test-results || true

          echo "CSV preview:"
          for file in test-results/*.csv; do
            echo "$file"
            head -n 20 "$file" || true
          done

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: oraclelinux97-r453-test-results
          path: test-results/
          if-no-files-found: warn
