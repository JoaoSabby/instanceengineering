name: Oracle Linux 9.7 R 4.5.3 validation

on:
  workflow_dispatch:
  push:
    paths:
      - "docker/oraclelinux97-r453/Dockerfile"
      - ".github/workflows/oraclelinux97-r453.yml"
      - "R/**"
      - "src/**"
      - "DESCRIPTION"
      - "NAMESPACE"
      - "tools/docker/**"

jobs:
  docker-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show commit and Dockerfile
        run: |
          echo "Commit:"
          git rev-parse HEAD

          echo "Dockerfile path:"
          ls -lah docker/oraclelinux97-r453/Dockerfile

          echo "Dockerfile content:"
          sed -n '1,180p' docker/oraclelinux97-r453/Dockerfile

          echo "Searching qpdf:"
          grep -n "qpdf" docker/oraclelinux97-r453/Dockerfile || true

      - name: Build Oracle Linux image
        run: |
          docker build \
            --no-cache \
            -f docker/oraclelinux97-r453/Dockerfile \
            -t instenginer:oraclelinux97-r453 \
            .

      - name: Create output directory
        run: |
          mkdir -p test-results

      - name: Run first container
        run: |
          docker run --rm \
            -e INSTANCE_ID=gha_1 \
            -e TEST_REPETITIONS=2 \
            -e TEST_KNN_WORKERS=2 \
            -e TEST_OUTPUT_DIR=/workspace/instenginer/test-results \
            -v "$PWD/test-results:/workspace/instenginer/test-results" \
            instenginer:oraclelinux97-r453 \
            Rscript tools/docker/run_many_tests.R

      - name: Run second container
        run: |
          docker run --rm \
            -e INSTANCE_ID=gha_2 \
            -e TEST_REPETITIONS=2 \
            -e TEST_KNN_WORKERS=2 \
            -e TEST_OUTPUT_DIR=/workspace/instenginer/test-results \
            -v "$PWD/test-results:/workspace/instenginer/test-results" \
            instenginer:oraclelinux97-r453 \
            Rscript tools/docker/run_many_tests.R

      - name: Show generated files
        if: always()
        run: |
          echo "Files in test-results:"
          ls -lah test-results || true

          echo "CSV preview:"
          for file in test-results/*.csv; do
            echo "$file"
            head -n 20 "$file" || true
          done

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: oraclelinux97-r453-test-results
          path: test-results/
          if-no-files-found: warn
