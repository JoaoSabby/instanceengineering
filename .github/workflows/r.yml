name: Oracle Linux 9.7 R 4.5.3 validation

on:
  workflow_dispatch:

jobs:
  docker-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Oracle Linux image
        run: |
          docker build \
            -f docker/oraclelinux97-r453/Dockerfile \
            -t instenginer:oraclelinux97-r453 \
            .

      - name: Create output directory
        run: |
          mkdir -p test-results

      - name: Run first container
        run: |
          docker run --rm \
            -e INSTANCE_ID=gha_1 \
            -e TEST_REPETITIONS=2 \
            -e TEST_KNN_WORKERS=2 \
            -e TEST_OUTPUT_DIR=/workspace/instenginer/test-results \
            -v "$PWD/test-results:/workspace/instenginer/test-results" \
            instenginer:oraclelinux97-r453 \
            Rscript tools/docker/run_many_tests.R

      - name: Run second container
        run: |
          docker run --rm \
            -e INSTANCE_ID=gha_2 \
            -e TEST_REPETITIONS=2 \
            -e TEST_KNN_WORKERS=2 \
            -e TEST_OUTPUT_DIR=/workspace/instenginer/test-results \
            -v "$PWD/test-results:/workspace/instenginer/test-results" \
            instenginer:oraclelinux97-r453 \
            Rscript tools/docker/run_many_tests.R

      - name: Show generated files
        run: |
          ls -lah test-results

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: oraclelinux97-r453-test-results
          path: test-results/
